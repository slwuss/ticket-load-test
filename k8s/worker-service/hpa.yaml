apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-service-hpa
  namespace: ticketing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale workers based on SQS queue depth (requires KEDA or custom metrics adapter)
    # Uncomment after installing KEDA:
    # - type: External
    #   external:
    #     metric:
    #       name: sqs_queue_depth
    #       selector:
    #         matchLabels:
    #           queue: booking-queue
    #     target:
    #       type: AverageValue
    #       averageValue: "500"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 5
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 300
