apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: ticketing
  labels:
    app: worker-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: worker-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: worker-service
      terminationGracePeriodSeconds: 60   # longer — workers finish in-flight DB writes
      containers:
        - name: worker-service
          image: <YOUR_ECR_REPO>/worker-service:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: database-url
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: redis-addr
            - name: SQS_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketing-config
                  key: sqs-queue-url
            - name: AWS_REGION
              value: ap-southeast-2
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "tempo.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "worker-service"
          ports:
            - containerPort: 9090
              name: metrics
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
