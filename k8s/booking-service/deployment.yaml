apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: ticketing
  labels:
    app: booking-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 0       # zero-downtime rolling deploy
  template:
    metadata:
      labels:
        app: booking-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: booking-service
      terminationGracePeriodSeconds: 30
      containers:
        - name: booking-service
          image: <YOUR_ECR_REPO>/booking-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_ADDR
              valueFrom:
                secretKeyRef:
                  name: ticketing-secrets
                  key: redis-addr
            - name: SQS_QUEUE_URL
              valueFrom:
                configMapKeyRef:
                  name: ticketing-config
                  key: sqs-queue-url
            - name: AWS_REGION
              value: ap-southeast-2
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "tempo.monitoring.svc.cluster.local:4317"
            - name: OTEL_SERVICE_NAME
              value: "booking-service"
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 2
          lifecycle:
            preStop:
              exec:
                # Allow ALB to drain connections before pod exits
                command: ["/bin/sh", "-c", "sleep 5"]
