apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: ticketing
spec:
  selector:
    app: booking-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: booking-route
  namespace: ticketing
spec:
  parentRefs:
    - name: app-alb-gateway
      namespace: default
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      backendRefs:
        - name: booking-service
          port: 80
