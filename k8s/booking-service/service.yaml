apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: ticketing
spec:
  selector:
    app: booking-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: booking-route
  namespace: ticketing
spec:
  hostnames:
    - "project-cruddur.com"
  parentRefs:
    - group: gateway.networking.k8s.io
      namespace: default
      kind: Gateway
      name: app-alb-gateway
      sectionName: https-root
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1
      backendRefs:
        - name: booking-service
          port: 80
---
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: booking-tg-config
  namespace: ticketing
spec:
  targetReference:
    name: booking-service
  defaultConfiguration:
    targetType: ip
